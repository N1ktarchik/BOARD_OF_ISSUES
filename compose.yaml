services:
  app:
    build: .
    container_name: app-container
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
          condition: service_healthy

  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build: .
    container_name: test-runner
    env_file:
      - .env
    depends_on:
      db:
          condition: service_healthy
    command: go test -v ./... 
    profiles:
      - testing

volumes:
  postgres-db:
